services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reports_db}
      POSTGRES_USER: ${POSTGRES_USER:-report_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-report_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./practice2/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-report_user} -d ${POSTGRES_DB:-reports_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  report-service:
    build:
      context: ./practice2/services/report-service
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://report_user:report_password@postgres:5432/reports_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_STREAM_NAME: ${REDIS_STREAM_NAME:-report_tasks}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  pdf-worker:
    build:
      context: ./practice2/services/pdf-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://report_user:report_password@postgres:5432/reports_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_STREAM_NAME: ${REDIS_STREAM_NAME:-report_tasks}
      REDIS_CONSUMER_GROUP: ${REDIS_CONSUMER_GROUP:-pdf_workers}
      WORKER_NAME: ${WORKER_NAME:-pdf-worker-1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./practice2/services/api-gateway
    environment:
      REPORT_SERVICE_URL: ${REPORT_SERVICE_URL:-http://report-service:8000}
    ports:
      - "8000:8000"
    depends_on:
      report-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
