apiVersion: v1
kind: ConfigMap
metadata:
  name: pdf-reports-config
  namespace: pdf-reports
data:
  PYTHONUNBUFFERED: "1"
  REPORT_SERVICE_URL: "http://report-service:8000"
  REQUEST_TIMEOUT_SECONDS: "10"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "reports_db"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_STREAM_NAME: "report_tasks"
  REDIS_CONSUMER_GROUP: "pdf_workers"
  WORKER_NAME: "pdf-worker-1"
  WORKER_POLL_SLEEP_SECONDS: "2"
  WORKER_AUTOSTART: "true"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "reports"
  MINIO_SECURE: "false"
